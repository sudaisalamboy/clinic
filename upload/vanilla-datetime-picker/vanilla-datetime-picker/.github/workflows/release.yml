name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - name: Prepare versioned release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          cp dist/index.esm.js "dist/vanilla-js-datetime-picker-${VERSION}.esm.js"
          cp dist/index.iife.min.js "dist/vanilla-js-datetime-picker-${VERSION}.iife.min.js"
          cp dist/style.css "dist/vanilla-js-datetime-picker-${VERSION}.css"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/vanilla-js-datetime-picker-${{ github.ref_name }}.esm.js
            dist/vanilla-js-datetime-picker-${{ github.ref_name }}.iife.min.js
            dist/vanilla-js-datetime-picker-${{ github.ref_name }}.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
